name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./macos
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build and Create DMG
        run: bash scripts/package-macos-dmg.sh
        env:
          CONFIGURATION: release

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows Executable
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=false -o ../macos/.build/windows
        working-directory: windows

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            .build/MCGA.dmg \
            .build/windows/MCGA.exe \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
