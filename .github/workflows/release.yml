name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./macos
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build and Package
        run: |
          chmod +x scripts/build-macos-app.sh
          bash scripts/build-macos-app.sh
        env:
          CONFIGURATION: release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "MCGA" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MCGA.app" 175 190 \
            --hide-extension "MCGA.app" \
            --app-drop-link 425 190 \
            ".build/MCGA.dmg" \
            ".build/MCGA.app"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows Executable
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=false -o ../macos/.build/windows
        working-directory: ../windows

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            .build/MCGA.dmg \
            .build/windows/MCGA.exe \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
