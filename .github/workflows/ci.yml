name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ./macos
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
        
      - name: Build
        run: swift build
        
      - name: Run Smoke Tests
        run: swift run MCGASmokeTests
